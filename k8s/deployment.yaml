apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-tomcat-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-tomcat
  template:
    metadata:
      labels:
        app: java-tomcat
    spec:
      containers:
      - name: java-tomcat-container
        image: java-tomcat-app
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
